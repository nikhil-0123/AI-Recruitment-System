services:
  db:
    image: pgvector/pgvector:pg15
    container_name: ai_recruitment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: aras_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_recruitment_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai_recruitment_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues default,ai,exports --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://aras_user:aras_password@db:5432/aras_db
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  nginx:
    image: nginx:alpine
    container_name: ai_recruitment_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db
      - redis
      - celery-worker

volumes:
  postgres_data: